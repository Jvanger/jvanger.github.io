<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan Fang — guest@jonathan-fang:~$</title>
    <meta name="description" content="Jonathan Fang — hardware × software engineer. A portfolio disguised as a machine. Type help to get started.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/terminal.css">
</head>
<body>
    <div id="terminal" role="application" aria-label="Interactive terminal portfolio">
        <div id="output"></div>
        <div id="promptLine" class="line"><span id="promptLabel"></span><span id="typed"></span><span id="cursor">&nbsp;</span><span id="typedAfter"></span></div>
    </div>

    <!-- hidden input keeps hardware + mobile keyboards working -->
    <input id="kbd" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="Terminal input">

    <!-- Perimeter frame — bare version of the GUI frame; its label
         slots stay empty here and fill in on the web version -->
    <div class="tframe" aria-hidden="true">
        <div class="tframe-border"></div>
        <span class="tframe-corner tl"></span>
        <span class="tframe-corner tr"></span>
        <span class="tframe-corner bl"></span>
        <span class="tframe-corner br"></span>
    </div>

    <!-- CRT chrome -->
    <div class="scanlines" aria-hidden="true"></div>
    <div id="crt" aria-hidden="true"></div>

    <!-- effects -->
    <canvas id="fx" aria-hidden="true"></canvas>
    <pre id="train" aria-hidden="true"></pre>

    <!-- fake vim -->
    <div id="vim" aria-hidden="true">
        <div id="vimBody"></div>
        <div id="vimStatus"></div>
        <div id="vimCmd"></div>
    </div>

    <noscript>
        <div style="padding:2rem;font-family:monospace;">
            JavaScript is off, so the terminal won't boot.
            <a href="home.html" style="color:#ce624c;">Use the web version instead.</a>
        </div>
    </noscript>

    <script src="js/terminal.js"></script>
</body>
</html>
